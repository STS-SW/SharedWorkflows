---
name: DotNet-Build-And-Test

on:
  workflow_call:
    inputs:
      repo-branch:
        description: "Repository Branch"
        type: string
        required: true
      platform:
        description: "The steps will run only on the platform specified"
        type: string
        default: "All"
      skip-pack:
        description: "Do not execute dotnet pack"
        type: boolean
        default: false
      job-timeout-minutes:
        description: "Overall timeout (minutes) for the build-and-test job"
        type: number
        default: 45
      test-timeout-minutes:
        description: "Timeout (minutes) for the DotNet Build And Test step"
        type: number
        default: 30
    secrets:
      RepositoryToken:
        required: true
      RegistryToken:
        required: true

defaults:
  run:
    shell: pwsh

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ inputs.job-timeout-minutes }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Clone
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        uses: STS-SW/SharedWorkflows/.github/actions/clone@master
        with:
          repo-branch: ${{inputs.repo-branch}}
          clone-devops: "false"
          is_debug: false
          token: ${{ secrets.RepositoryToken }}

      - name: Setup
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        uses: STS-SW/SharedWorkflows/.github/actions/setup@master
        with:
          environment: dotnet

      - name: Log Cloned Branches
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        run: |
          Write-Host "************** Repo Data **************"
          Write-Host "repo-branch  : ${{ inputs.repo-branch }}"
          Write-Host "platform     : ${{ inputs.platform }}"
          Write-Host "skip-pack    : ${{ inputs.skip-pack }}"
          Write-Host "Repo   branch: $(git -C ./Repo    rev-parse --abbrev-ref HEAD)"

      # The CI engine is sts-tools (a published .NET global tool), not the legacy DevOps
      # PowerShell engine. Install it from the GitHub Packages feed before the build steps.
      - name: Install sts-tools
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/StsSoftware/index.json" `
            --name sts-github --username ci --password "${{ secrets.RegistryToken }}" --store-password-in-clear-text
          dotnet tool install --global sts-tools

      # Repos consuming the Sts.Sdk / Sts.Test.Sdk MSBuild project SDKs pin exact versions in
      # global.json (msbuild-sdks does not support floating versions). CI always builds against the
      # latest published SDKs by rewriting the pins in the runner workspace (never committed).
      # No-op for repos without a global.json / msbuild-sdks section.
      - name: Pin Latest STS SDKs
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        run: sts-tools devops pinSdk --folder ./Repo --registryToken "${{ secrets.RegistryToken }}"

      - name: DotNet Build And Test
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        timeout-minutes: ${{ inputs.test-timeout-minutes }}
        run: sts-tools devops runFolderWorkflow --folder ./Repo --isWorkflow

      - name: DotNet Pack
        if: ${{ !inputs.skip-pack && runner.os == 'Windows' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') }}
        run: sts-tools devops runWorkflow --folder ./Repo --filter "*.csproj" --tasks DotNetPack --isWorkflow --registryToken "${{ secrets.RegistryToken }}" --repositoryToken "${{ secrets.RepositoryToken }}"
