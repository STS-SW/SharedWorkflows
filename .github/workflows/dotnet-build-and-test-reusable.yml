---
name: DotNet-Build-And-Test

on:
  workflow_call:
    inputs:
      repo-branch:
        description: "Repository Branch"
        type: string
        required: true
      platform:
        description: "The steps will run only on the platform specified"
        type: string
        default: "All"
      skip-pack:
        description: "Do not execute dotnet pack"
        type: boolean
        default: false
    secrets:
      RepositoryToken:
        required: true
      RegistryToken:
        required: true

defaults:
  run:
    shell: pwsh

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Clone
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        uses: STS-SW/SharedWorkflows/.github/actions/clone@master
        with:
          repo-branch: ${{inputs.repo-branch}}
          devops-branch: "master"
          is_debug: false
          token: ${{ secrets.RepositoryToken }}

      - name: Setup
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        uses: STS-SW/SharedWorkflows/.github/actions/setup@master
        with:
          environment: dotnet

      - name: Log Cloned Branches
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        run: |
          Write-Host "************** Repo Data **************"
          Write-Host "repo-branch  : ${{ inputs.repo-branch }}"
          Write-Host "platform     : ${{ inputs.platform }}"
          Write-Host "skip-pack    : ${{ inputs.skip-pack }}"
          Write-Host "Repo   branch: $(git -C ./Repo    rev-parse --abbrev-ref HEAD)"
          Write-Host "DevOps branch: $(git -C ./DevOps  rev-parse --abbrev-ref HEAD)"

      # Repos consuming the Sts.Build.Sdk MSBuild project SDK pin an exact version in
      # global.json (msbuild-sdks does not support floating versions). Developers manage
      # their local pins; CI always builds against the latest published SDK by rewriting
      # the pin in the runner workspace (never committed). No-op for non-migrated repos.
      - name: Pin Latest Sts.Build.Sdk
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        run: |
          $globalJsonPath = "./Repo/global.json"
          if (-not (Test-Path $globalJsonPath)) {
            Write-Host "No global.json in the repository, skipping the Sts.Build.Sdk pin"
            exit 0
          }

          $globalJson = Get-Content $globalJsonPath -Raw | ConvertFrom-Json
          $sdks = $globalJson.'msbuild-sdks'
          if (-not $sdks -or -not $sdks.PSObject.Properties['Sts.Build.Sdk']) {
            Write-Host "global.json does not pin Sts.Build.Sdk, skipping"
            exit 0
          }

          try {
            $headers = @{ Authorization = "Bearer ${{ secrets.RegistryToken }}" }
            $index = Invoke-RestMethod -Headers $headers "https://nuget.pkg.github.com/StsSoftware/download/sts.build.sdk/index.json"
          }
          catch {
            Write-Warning "Could not query the Sts.Build.Sdk feed ($($_.Exception.Message)); keeping the committed pin"
            exit 0
          }

          if (-not $index.versions) {
            Write-Warning "No Sts.Build.Sdk version published yet; keeping the committed pin"
            exit 0
          }

          $latest = ($index.versions | ForEach-Object { [System.Management.Automation.SemanticVersion]$_ } | Sort-Object)[-1].ToString()
          $previous = $sdks.'Sts.Build.Sdk'
          $sdks.'Sts.Build.Sdk' = $latest
          $globalJson | ConvertTo-Json -Depth 10 | Set-Content $globalJsonPath
          Write-Host "Sts.Build.Sdk pinned to [$latest] (committed pin was [$previous])"

      - name: DotNet Build And Test
        if: ${{  inputs.platform == 'All' || inputs.platform==runner.os }}
        run: ./DevOps/Src/Utils/RunWorkFlow.ps1 -Folder ./Repo -FilesFilter *.csproj -Tasks DotNetBuildAndTest -PostWorkflowTask PostDotNetWorkFlow -Configuration @{}

      - name: DotNet Pack
        if: ${{ !inputs.skip-pack && runner.os == 'Windows' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') }}
        run: ./DevOps/Src/Utils/RunWorkFlow.ps1 -Folder ./Repo -FilesFilter *.csproj -Tasks DotNetPack -Configuration @{ RegistryToken="${{ secrets.RegistryToken }}"; RepositoryToken="${{ secrets.RepositoryToken }}"; }
